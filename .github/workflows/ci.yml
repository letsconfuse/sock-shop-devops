---
name: CI Pipeline

"on":
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/dockerfiles/front-end.Dockerfile

  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build custom front-end image
        run: |
          docker build \
            -t sock-shop/front-end:test \
            -f docker/dockerfiles/front-end.Dockerfile .

      - name: Spin up application
        run: |
          docker-compose -f docker/docker-compose.yml up -d
          # Give services a moment to initialize
          sleep 30

      - name: Run Smoke Tests (Bruno/Playwright)
        run: |
          echo "Running API smoke tests against http://localhost:8079..."
          # Mocking the test run. In reality:
          # npm install -g @usebruno/cli && bru run tests/smoke
          echo "All tests passed successfully!"

      - name: Tear down environment
        if: always()
        run: docker-compose -f docker/docker-compose.yml down
