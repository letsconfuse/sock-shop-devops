---
name: Setup Go
description: Setup Go and actionlint

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: "1.24"

    - shell: bash
      run: |
        go install github.com/rhysd/actionlint/cmd/actionlint@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
